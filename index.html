<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPC沖縄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf8ee;
    --bg-soft: #f7eed8;
    --ink: #2b2520;
    --ink-soft: #5a4a3f;
    --ink-mute: #9c8b7a;
    --line: #e8dcc4;
    --paper: #ffffff;
    --accent: #e8533e;        /* 朱色をビビッドに */
    --accent-deep: #c43d28;
    --accent-soft: #ffd9d0;
    --gold: #f0b942;
    --bamboo: #5fa83f;        /* 緑も明るめに */
    --sky: #5ab4d6;
    --pink: #f08aa8;
    --rank-1: #f0b942;
    --rank-2: #b8b0a3;
    --rank-3: #d97f4c;
    --rank-4: #6b5d52;
    --shadow: 6px 6px 0 rgba(232, 83, 62, 0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-feature-settings: "palt";
    -webkit-font-smoothing: antialiased;
  }
  body {
    background-image:
      radial-gradient(circle at 15% 20%, rgba(240, 185, 66, 0.12), transparent 35%),
      radial-gradient(circle at 85% 80%, rgba(95, 168, 63, 0.10), transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(232, 83, 62, 0.04), transparent 60%);
    min-height: 100vh;
  }
  .container {
    max-width: 1180px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }
  a { color: inherit; text-decoration: none; }

  /* ==== Header ==== */
  header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 32px;
    align-items: end;
    padding-bottom: 28px;
    margin-bottom: 32px;
    border-bottom: 2px dashed var(--line);
    position: relative;
  }
  header::after {
    content: "";
    position: absolute;
    bottom: -5px; left: 0;
    width: 120px; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 2px;
  }
  .logo-mark {
    width: 68px; height: 68px;
    border: 3px solid var(--ink);
    border-radius: 20px;
    display: grid;
    place-items: center;
    font-family: 'Shippori Mincho', serif;
    font-size: 34px;
    font-weight: 800;
    background: var(--gold);
    color: var(--ink);
    box-shadow: var(--shadow);
    cursor: pointer;
    transform: rotate(-3deg);
    transition: transform 0.15s ease;
  }
  .logo-mark:hover { transform: rotate(0deg) scale(1.05); }
  .title-block h1 {
    font-family: 'Shippori Mincho', serif;
    font-weight: 800;
    font-size: 30px;
    letter-spacing: 0.02em;
    line-height: 1.15;
    margin-bottom: 6px;
    cursor: pointer;
  }
  .title-block h1 .accent {
    color: var(--accent);
    position: relative;
    display: inline-block;
  }
  .title-block h1 .accent::after {
    content: "";
    position: absolute;
    bottom: -2px; left: 0; right: 0;
    height: 6px;
    background: var(--gold);
    opacity: 0.5;
    z-index: -1;
    border-radius: 3px;
  }
  .title-block .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--ink-mute);
    text-transform: uppercase;
  }
  .meta-block {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-mute);
    line-height: 1.8;
  }
  .meta-block .label { color: var(--ink-mute); }
  .meta-block .val { color: var(--ink); font-weight: 700; }

  /* ==== Two-column layout ==== */
  .two-col {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 24px;
    margin-bottom: 56px;
  }
  .two-col section { margin-bottom: 0; }

  /* ==== Today's results (side column) ==== */
  .today-list {
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 18px;
    overflow: hidden;
  }
  .today-item {
    padding: 14px 16px;
    border-bottom: 1px dashed var(--line);
  }
  .today-item:last-child { border-bottom: none; }
  .today-item-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-mute);
    letter-spacing: 0.1em;
  }
  .today-item-num {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--accent);
  }
  .today-mini-list {
    display: grid;
    gap: 6px;
  }
  .today-mini-row {
    display: grid;
    grid-template-columns: 22px 1fr auto auto;
    gap: 8px;
    align-items: center;
    padding: 5px 8px;
    background: var(--bg-soft);
    border-radius: 8px;
    border-left: 3px solid var(--line);
    font-size: 12px;
  }
  .today-mini-row.r1 { border-left-color: var(--gold); background: rgba(240, 185, 66, 0.10); }
  .today-mini-row.r2 { border-left-color: var(--sky); background: rgba(90, 180, 214, 0.06); }
  .today-mini-row.r3 { border-left-color: var(--rank-3); background: rgba(217, 127, 76, 0.06); }
  .today-mini-row.r4 { border-left-color: var(--rank-4); }
  .today-mini-rank {
    font-family: 'Shippori Mincho', serif;
    font-weight: 700;
    text-align: center;
    color: var(--ink-soft);
  }
  .today-mini-row.r1 .today-mini-rank { color: var(--rank-1); }
  .today-mini-name {
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .today-mini-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-mute);
  }
  .today-mini-pt {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 12px;
  }
  .today-mini-pt.pos { color: var(--bamboo); }
  .today-mini-pt.neg { color: var(--accent); }

  @media (max-width: 980px) {
    .two-col { grid-template-columns: 1fr; gap: 32px; }
  }
  .period-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    overflow-x: auto;
    flex-wrap: nowrap;
    padding: 4px;
  }
  .period-chip {
    padding: 10px 18px;
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 14px;
  }
  .period-chip:hover {
    background: var(--bg-soft);
    transform: translateY(-2px);
    border-color: var(--gold);
  }
  .period-chip.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    box-shadow: 0 3px 0 var(--accent-deep);
  }
  .period-chip .en {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--ink-mute);
    margin-bottom: 2px;
  }
  .period-chip.active .en { color: rgba(255, 255, 255, 0.7); }

  /* ==== Status / source bar ==== */
  .source-bar {
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 14px;
    padding: 12px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .source-bar .src-label {
    color: var(--ink-mute);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-right: 2px dashed var(--line);
    padding-right: 12px;
  }
  .source-bar input {
    flex: 1;
    min-width: 200px;
    border: none;
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink);
    outline: none;
  }
  .source-bar button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 18px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 10px;
    box-shadow: 0 2px 0 var(--accent-deep);
    transition: transform 0.1s;
  }
  .source-bar button:hover { transform: translateY(-1px); }
  .source-bar button:active { transform: translateY(1px); box-shadow: none; }
  .source-bar .status { color: var(--bamboo); font-weight: 700; }
  .source-bar .toggle-src {
    color: var(--ink-mute);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
    margin-left: auto;
  }
  .source-detail { display: none; }
  .source-detail.visible { display: flex; }

  /* ==== Section ==== */
  section { margin-bottom: 56px; }
  .section-head {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
  }
  .section-head h2 {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .section-head .en {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--ink-mute);
    text-transform: uppercase;
  }
  .section-head .rule {
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  /* ==== Stats overview ==== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 40px;
  }
  .stat-card {
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 20px;
    position: relative;
    transition: transform 0.15s;
  }
  .stat-card:hover {
    transform: translateY(-3px);
  }
  .stat-card:nth-child(1) { border-top: 5px solid var(--gold); }
  .stat-card:nth-child(2) { border-top: 5px solid var(--sky); }
  .stat-card:nth-child(3) { border-top: 5px solid var(--bamboo); }
  .stat-card:nth-child(4) { border-top: 5px solid var(--accent); }
  .stat-card .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-mute);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .stat-card .stat-value {
    font-family: 'Shippori Mincho', serif;
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-card .stat-sub {
    font-size: 11px;
    color: var(--ink-mute);
    margin-top: 6px;
  }

  /* ==== Ranking table ==== */
  .ranking {
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 18px;
    overflow: hidden;
  }
  .ranking table {
    width: 100%;
    border-collapse: collapse;
  }
  .ranking th {
    text-align: left;
    padding: 14px 20px;
    background: var(--bg-soft);
    border-bottom: 3px solid var(--gold);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    text-transform: uppercase;
    font-weight: 700;
  }
  .ranking th.num, .ranking td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .ranking th.center, .ranking td.center { text-align: center; }
  .ranking td {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }
  .ranking tr:last-child td { border-bottom: none; }
  .ranking tr.row { cursor: pointer; transition: background 0.1s; }
  .ranking tr.row:hover { background: var(--bg-soft); }
  .ranking tr.row:hover .player-name { color: var(--accent); }
  .ranking .rank-cell {
    font-family: 'Shippori Mincho', serif;
    font-size: 20px;
    font-weight: 700;
    width: 70px;
    text-align: center;
  }
  .ranking .rank-1 { color: var(--rank-1); }
  .ranking .rank-2 { color: var(--rank-2); }
  .ranking .rank-3 { color: var(--rank-3); }
  .ranking .player-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 17px;
    font-weight: 700;
    transition: color 0.15s;
  }
  .ranking .player-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-mute);
    margin-right: 8px;
  }
  .ranking .points {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
  }
  .ranking .points.pos { color: var(--bamboo); }
  .ranking .points.neg { color: var(--accent); }
  .ranking .games-mini {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-mute);
    margin-left: 10px;
  }
  .ranking .rank-dist {
    display: inline-flex;
    gap: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .ranking .rank-dist span {
    background: var(--bg-soft);
    padding: 3px 9px;
    color: var(--ink-soft);
    border-radius: 10px;
    font-weight: 700;
  }
  .ranking .arrow-link {
    color: var(--ink-mute);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
  }

  /* ==== Recent results ==== */
  .records {
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 18px;
    overflow: hidden;
  }
  .record-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 24px;
    padding: 18px 20px;
    border-bottom: 1px dashed var(--line);
    align-items: center;
  }
  .record-row:last-child { border-bottom: none; }
  .record-row:hover { background: var(--bg-soft); }
  .record-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-mute);
    line-height: 1.6;
    border-right: 2px dashed var(--line);
    padding-right: 14px;
  }
  .record-time .date { display: block; font-size: 14px; color: var(--ink); font-weight: 700; }
  .record-results {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .result-slot {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--bg-soft);
    border-left: 4px solid var(--line);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .result-slot:hover { transform: translateY(-2px); }
  .result-slot.r1 { border-left-color: var(--gold); background: rgba(240, 185, 66, 0.12); }
  .result-slot.r2 { border-left-color: var(--sky); background: rgba(90, 180, 214, 0.08); }
  .result-slot.r3 { border-left-color: var(--rank-3); background: rgba(217, 127, 76, 0.08); }
  .result-slot.r4 { border-left-color: var(--rank-4); }
  .result-rank {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--ink-soft);
    width: 18px;
    text-align: center;
  }
  .result-slot.r1 .result-rank { color: var(--rank-1); }
  .result-info { flex: 1; min-width: 0; }
  .result-name {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result-name .pn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-mute);
    margin-right: 4px;
    font-weight: 400;
  }
  .result-name .seat-tag {
    display: inline-block;
    font-family: 'Shippori Mincho', serif;
    font-size: 10px;
    background: var(--ink);
    color: var(--gold);
    padding: 1px 5px;
    border-radius: 4px;
    margin-right: 4px;
    font-weight: 700;
    vertical-align: middle;
  }
  .result-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-mute);
  }
  .result-pt {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
  }
  .result-pt.pos { color: var(--bamboo); }
  .result-pt.neg { color: var(--accent); }

  /* ==== Player page ==== */
  .player-header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 32px;
    align-items: center;
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 24px;
    padding: 32px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }
  .player-header::before {
    content: "";
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, var(--accent-soft), transparent 70%);
    border-radius: 50%;
    z-index: 0;
  }
  .player-header > * { position: relative; z-index: 1; }
  .player-avatar {
    width: 96px; height: 96px;
    border: 3px solid var(--ink);
    background: var(--gold);
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-family: 'Shippori Mincho', serif;
    font-size: 44px;
    font-weight: 800;
    box-shadow: var(--shadow);
    color: var(--ink);
  }
  .player-headline h2 {
    font-family: 'Shippori Mincho', serif;
    font-size: 38px;
    font-weight: 800;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .player-headline .pn-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--ink-mute);
    text-transform: uppercase;
  }
  .player-headline .pt-summary {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    margin-top: 12px;
  }
  .player-headline .pt-summary.pos { color: var(--bamboo); }
  .player-headline .pt-summary.neg { color: var(--accent); }
  .back-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--ink-mute);
    text-transform: uppercase;
    cursor: pointer;
    align-self: start;
  }
  .back-link:hover { color: var(--accent); }

  /* ==== Player stats grid ==== */
  .player-stats {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-bottom: 40px;
  }
  .player-stat {
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    transition: transform 0.15s;
  }
  .player-stat:hover { transform: translateY(-3px); }
  .player-stat .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--ink-mute);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .player-stat .value {
    font-family: 'Shippori Mincho', serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }
  .player-stat .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-mute);
    margin-top: 4px;
  }
  .player-stat.r1 .value { color: var(--rank-1); }
  .player-stat.r2 .value { color: var(--rank-2); }
  .player-stat.r3 .value { color: var(--rank-3); }
  .player-stat.r4 .value { color: var(--rank-4); }
  .player-stat.best .value { color: var(--bamboo); }
  .player-stat.worst .value { color: var(--accent); }

  /* ==== Chart ==== */
  .chart-wrap {
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 24px;
    margin-bottom: 40px;
  }
  .chart-wrap svg { width: 100%; height: auto; display: block; }

  /* ==== Footer ==== */
  footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-mute);
    letter-spacing: 0.15em;
  }

  /* ==== Empty state ==== */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    font-family: 'Shippori Mincho', serif;
    color: var(--ink-mute);
    background: var(--paper);
    border: 2px dashed var(--line);
    border-radius: 18px;
  }
  .empty-state .emoji { font-size: 36px; margin-bottom: 12px; opacity: 0.6; }

  /* ==== Responsive ==== */
  @media (max-width: 880px) {
    .container { padding: 28px 16px 56px; }
    header { grid-template-columns: auto 1fr; gap: 16px; }
    .meta-block { display: none; }
    .title-block h1 { font-size: 22px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .ranking { overflow-x: auto; }
    .ranking table { min-width: 600px; }
    .record-results { grid-template-columns: repeat(2, 1fr); }
    .player-header { grid-template-columns: auto 1fr; padding: 20px; gap: 16px; }
    .player-avatar { width: 64px; height: 64px; font-size: 28px; }
    .player-headline h2 { font-size: 24px; }
    .player-headline .pt-summary { font-size: 18px; }
    .back-link { grid-column: 1 / -1; }
    .player-stats { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-mark" onclick="location.reload()">雀</div>
    <div class="title-block">
      <h1 onclick="location.reload()">GPC<span class="accent">沖縄</span></h1>
      <div class="subtitle">GPC OKINAWA · MONTHLY SERIES</div>
    </div>
    <div class="meta-block">

    <div class="src-label">RESULTS</div>

  </div>
  <div class="source-bar source-detail" id="sourceDetail2">
    <div class="src-label">PLAYERS</div>
    <input type="text" id="masterUrl" placeholder="「選手マスタ」シートのURL">
  </div>

  <!-- ==== ホーム画面 ==== -->
  <div id="homeView">
    <div class="period-bar" id="periodBar"></div>

    <section>

        <div class="rule"></div>
      </div>
      <div class="stats-grid" id="statsGrid"></div>
    </section>

    <div class="two-col">
      <section class="col-main">
        <div class="section-head">
          <h2>順位表</h2>
          <span class="en">RANKING</span>
          <div class="rule"></div>
        </div>
        <div id="rankingWrap"></div>
      </section>

      <section class="col-side">
        <div class="section-head">

        <h2>対局履歴</h2>

        <div class="rule"></div>
      </div>
      <div id="recordsList"></div>
    </section>
  </div>

  <footer>
    <div>© GPC沖縄</div>

  </footer>
</div>

<script>
'use strict';

// ============================================================
// 設定
// ============================================================
const DEFAULT_RESULTS_URL = "https://docs.google.com/spreadsheets/d/1HSK0BryAmGGKuki39lJxg1RK-qS9ctwDgZgVQS3Soc0/edit?gid=0#gid=0";
const DEFAULT_MASTER_URL  = "https://docs.google.com/spreadsheets/d/1kNrmmxhnt_vUsUmd1E9hZE_QzN4KSctJ1DkUweWIURw/edit";
const AUTO_REFRESH_MS = 300000;   // 5分ごとに自動更新(0で無効)

// ウマ・オカ
const UMA = [30, 10, -10, -30];
const RETURN_PT = 30000;
const ORIGIN_PT = 25000;

// ============================================================
// サンプルデータ生成
// ============================================================
const POOL = [
  '比嘉','金城','大城','宮城','上原','新垣','玉城','島袋',
  '仲宗根','山田','照屋','當間','与那覇','安里','謝花','宮里',
  '長嶺','仲井真','屋良','石川'
];
const PLAYER_MASTER_SAMPLE = POOL.map((name, i) => ({ num: 101 + i, name }));

function generateSampleRows() {
  const rows = [];
  let seed = 42;
  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  const seatNames = ['東', '南', '西', '北'];

  // GPC沖縄: 月1回開催のシリーズ
  // 過去12ヶ月分の大会を生成、各回 4回戦 × 3卓 = 12対局
  const today = new Date();
  const tables = 3;
  const hanchanCount = 4;

  // 節番号は古い→新しいで1から連番
  const totalMonths = 13;
  for (let monthOffset = totalMonths - 1; monthOffset >= 0; monthOffset--) {
    const setsuNum = totalMonths - monthOffset;
    const eventDate = new Date(today.getFullYear(), today.getMonth() - monthOffset, 1);
    // 第2土曜日を探す
    let count = 0;
    while (count < 2) {
      if (eventDate.getDay() === 6) count++;
      if (count < 2) eventDate.setDate(eventDate.getDate() + 1);
    }
    eventDate.setHours(10, 0, 0, 0);

    for (let h = 0; h < hanchanCount; h++) {
      for (let t = 0; t < tables; t++) {
        const ts = new Date(eventDate);
        ts.setHours(10 + h * 2, t * 15 + Math.floor(rand() * 10));

        const shuffled = [...PLAYER_MASTER_SAMPLE].sort(() => rand() - 0.5);
        const picked = shuffled.slice(t * 4, t * 4 + 4);
        if (picked.length < 4) continue;

        let scores = [
          25000 + Math.floor(rand() * 25000),
          25000 + Math.floor(rand() * 10000) - 5000,
          25000 - Math.floor(rand() * 10000),
          25000 - Math.floor(rand() * 20000),
        ];
        const sum = scores.reduce((s, v) => s + v, 0);
        scores[0] += (100000 - sum);
        scores = scores.map(s => Math.round(s / 100) * 100);
        const diff = 100000 - scores.reduce((s, v) => s + v, 0);
        scores[0] += diff;

        const playerScorePairs = picked.map((p, i) => ({ player: p, score: scores[i] }));
        playerScorePairs.sort(() => rand() - 0.5);
        rows.push({
          timestamp: ts.getTime(),
          gameDate: ts.getTime(),
          setsu: setsuNum,
          kaisen: h + 1,
          taku: t + 1,
          players: playerScorePairs.map((pair, i) => ({
            num: pair.player.num,
            name: pair.player.name,
            score: pair.score,
            seat: seatNames[i]
          }))
        });
      }
    }
  }
  return rows;
}
const SAMPLE_ROWS = generateSampleRows();

// ============================================================
// ポイント計算(同点ウマオカ山分け対応)
// ============================================================
function calcPoints(playersSortedByScoreDesc) {
  const n = playersSortedByScoreDesc.length;
  const groups = [];
  let i = 0;
  while (i < n) {
    let j = i;
    while (j + 1 < n && playersSortedByScoreDesc[j + 1].score === playersSortedByScoreDesc[i].score) j++;
    groups.push({
      indices: Array.from({length: j - i + 1}, (_, k) => i + k),
      startRank: i + 1,
      endRank: j + 1
    });
    i = j + 1;
  }
  const okaTotal = (RETURN_PT - ORIGIN_PT) * 4 / 1000;
  return playersSortedByScoreDesc.map((p, idx) => {
    const group = groups.find(g => g.indices.includes(idx));
    const groupSize = group.indices.length;
    let umaSum = 0;
    for (let r = group.startRank; r <= group.endRank; r++) umaSum += UMA[r - 1];
    const umaAvg = umaSum / groupSize;
    let okaShare = 0;
    if (group.startRank === 1) okaShare = okaTotal / groupSize;
    const pt = (p.score - RETURN_PT) / 1000 + umaAvg + okaShare;
    return { ...p, rank: group.startRank, pt: Math.round(pt * 10) / 10 };
  });
}

// ============================================================
// 状態
// ============================================================
// playerMaster は「節ごとの選手番号→名前マップ」に変更
// 構造: { 1: {36: '内間 亮', ...}, 2: {12: '内間 亮', ...}, ... }
let playerMaster = {};
let allRows = [];
let allGames = []; // 計算済みの全対局
let autoRefreshTimer = null;
let currentPeriod = 'all'; // 'all' | 'year:YYYY' | 'month:YYYY-MM'

// 初期マスタ(サンプル用) — 全節共通のマスタとして扱う(サンプル簡略化)
function initSampleMaster() {
  playerMaster = {};
  for (let s = 1; s <= 13; s++) {
    playerMaster[s] = {};
    PLAYER_MASTER_SAMPLE.forEach(p => { playerMaster[s][p.num] = p.name; });
  }
}
initSampleMaster();

// 節番号と選手番号から選手名を取得(節指定なしなら任意の節を試す)
function getPlayerName(setsu, num) {
  if (setsu && playerMaster[setsu] && playerMaster[setsu][num]) {
    return playerMaster[setsu][num];
  }
  // フォールバック: 全節を検索
  for (const s in playerMaster) {
    if (playerMaster[s][num]) return playerMaster[s][num];
  }
  return `#${num}`;
}

// ============================================================
// データ処理
// ============================================================
function processRows(rows) {
  // 重複除去: 同じ(節,回戦,卓)の組み合わせは、送信日時(timestamp)が最新のものだけ採用
  // 節・回戦・卓のいずれかが空(旧形式データ)の場合は個別扱いのまま
  const latestMap = {};
  rows.forEach(row => {
    if (row.setsu && row.kaisen && row.taku) {
      const key = `${row.setsu}-${row.kaisen}-${row.taku}`;
      if (!latestMap[key] || row.timestamp > latestMap[key].timestamp) {
        latestMap[key] = row;
      }
    } else {
      // 節・回戦・卓がない旧形式データはtimestampをキーに個別に残す
      const key = `raw-${row.timestamp}-${Math.random()}`;
      latestMap[key] = row;
    }
  });
  const deduped = Object.values(latestMap);

  return deduped.map(row => ({
    timestamp: row.timestamp,
    gameDate: row.gameDate || row.timestamp,
    setsu: row.setsu,
    kaisen: row.kaisen,
    taku: row.taku,
    results: calcPoints([...row.players].sort((a, b) => b.score - a.score))
  })).sort((a, b) => b.timestamp - a.timestamp);
}

function aggregatePlayers(games) {
  const map = {};
  games.forEach(g => g.results.forEach(r => {
    // 名前をキーに集計(節ごとに番号が変わっても同一人物として扱う)
    // 「#123」のように未登録番号の場合は各節で別扱いにする
    const key = r.name;
    if (!map[key]) map[key] = { num: r.num, name: r.name, totalPt: 0, games: 0, ranks: [0,0,0,0] };
    map[key].totalPt += r.pt;
    map[key].games += 1;
    map[key].ranks[r.rank - 1] += 1;
  }));
  return Object.values(map).map(p => ({
    ...p,
    totalPt: Math.round(p.totalPt * 10) / 10,
    avgRank: p.games > 0 ? Math.round((p.ranks.reduce((s, c, i) => s + c * (i+1), 0) / p.games) * 100) / 100 : 0,
    rates: p.ranks.map(c => p.games > 0 ? Math.round((c / p.games) * 1000) / 10 : 0)
  })).sort((a, b) => b.totalPt - a.totalPt);
}

// 今日の対局のみ抽出
function getTodayGames(games) {
  const today = new Date();
  const y = today.getFullYear();
  const m = today.getMonth();
  const d = today.getDate();
  return games.filter(g => {
    const gd = new Date(g.gameDate || g.timestamp);
    return gd.getFullYear() === y && gd.getMonth() === m && gd.getDate() === d;
  });
}

// 期間フィルタ
function filterByPeriod(games, period) {
  if (period === 'all') return games;
  if (period.startsWith('year:')) {
    const y = parseInt(period.split(':')[1]);
    return games.filter(g => new Date(g.gameDate || g.timestamp).getFullYear() === y);
  }
  if (period.startsWith('month:')) {
    const [y, m] = period.split(':')[1].split('-').map(Number);
    return games.filter(g => {
      const d = new Date(g.gameDate || g.timestamp);
      return d.getFullYear() === y && d.getMonth() + 1 === m;
    });
  }
  return games;
}

// データから利用可能な期間タブを生成
// 通算 → 年(新しい順) → 月(新しい順) のフラットな並び
function getAvailablePeriods(games) {
  const years = new Set();
  const months = new Set();
  games.forEach(g => {
    const d = new Date(g.gameDate || g.timestamp);
    const y = d.getFullYear();
    const m = d.getMonth() + 1;
    years.add(y);
    months.add(`${y}-${String(m).padStart(2, '0')}`);
  });
  const yearArr = Array.from(years).sort((a, b) => b - a);
  const monthArr = Array.from(months).sort().reverse();
  const result = [{ key: 'all', jp: '通算', en: 'ALL' }];
  yearArr.forEach(y => {
    result.push({ key: `year:${y}`, jp: `${y}年`, en: `${y}` });
  });
  monthArr.forEach(ym => {
    const [y, m] = ym.split('-');
    result.push({ key: `month:${ym}`, jp: `${y}年${parseInt(m)}月`, en: `${y}.${m}` });
  });
  return result;
}

// ============================================================
// ホーム画面の描画
// ============================================================
function renderHome() {
  // 期間バー描画
  const periods = getAvailablePeriods(allGames);
  // 現在の期間が存在しなければ通算に戻す
  if (!periods.some(p => p.key === currentPeriod)) currentPeriod = 'all';
  renderPeriodBar(periods);

  // フィルタ適用
  const filtered = filterByPeriod(allGames, currentPeriod);
  const players = aggregatePlayers(filtered);

  // 「開催中/最新の大会」= フィルタ後の中で最新の日付の対局
  const latestDayGames = getLatestDayGames(filtered);

  renderHomeStats(filtered, players, latestDayGames);
  renderHomeRanking(players);
  renderTodayList(latestDayGames);
  renderHomeRecords(filtered);
}

function renderPeriodBar(periods) {
  const container = document.getElementById('periodBar');
  container.innerHTML = periods.map(p => {
    const active = p.key === currentPeriod ? 'active' : '';
    return `<button class="period-chip ${active}" data-key="${p.key}">
      <span class="en">${p.en}</span>${p.jp}
    </button>`;
  }).join('');
  container.querySelectorAll('.period-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      currentPeriod = chip.dataset.key;
      renderHome();
    });
  });
}

// フィルタ後の対局から、最新の日付の対局を抽出(その日=最新大会1回分)
function getLatestDayGames(games) {
  if (games.length === 0) return [];
  const latestTs = Math.max(...games.map(g => g.gameDate || g.timestamp));
  const latest = new Date(latestTs);
  const y = latest.getFullYear(), m = latest.getMonth(), d = latest.getDate();
  return games.filter(g => {
    const gd = new Date(g.gameDate || g.timestamp);
    return gd.getFullYear() === y && gd.getMonth() === m && gd.getDate() === d;
  });
}

function renderHomeStats(games, players, latestDayGames) {
  const totalGames = games.length;
  const totalPlayers = players.length;
  const top = players[0];
  const latestCount = latestDayGames ? latestDayGames.length : 0;

  // 現在の期間ラベル
  const periods = getAvailablePeriods(allGames);
  const cur = periods.find(p => p.key === currentPeriod) || periods[0];

  // 最新大会の日付表示
  let latestLabel = '—';
  if (latestDayGames && latestDayGames.length > 0) {
    const d = new Date(latestDayGames[0].gameDate || latestDayGames[0].timestamp);
    latestLabel = `${d.getMonth() + 1}/${d.getDate()}`;
  }

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">PERIOD</div>
      <div class="stat-value" style="font-size:22px;">${cur.jp}</div>
      <div class="stat-sub">表示中の期間</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">GAMES</div>
      <div class="stat-value">${totalGames}</div>
      <div class="stat-sub">対局数</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">PLAYERS</div>
      <div class="stat-value">${totalPlayers}</div>
      <div class="stat-sub">参加人数</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">LEADER</div>
      <div class="stat-value" style="font-size:22px;">${top ? top.name : '—'}</div>
      <div class="stat-sub">${top ? ((top.totalPt > 0 ? '+' : '') + top.totalPt + ' pt') : '—'}</div>
    </div>
  `;
}

function renderHomeRanking(players) {
  if (players.length === 0) {
    document.getElementById('rankingWrap').innerHTML = `<div class="empty-state"><div class="emoji">🀄</div>まだ記録がありません</div>`;
    return;
  }
  const rows = players.map((p, i) => {
    const rank = i + 1;
    const rankClass = rank <= 3 ? `rank-${rank}` : '';
    const ptClass = p.totalPt >= 0 ? 'pos' : 'neg';
    const ptStr = (p.totalPt > 0 ? '+' : '') + p.totalPt.toFixed(1);
    return `
      <tr class="row">
        <td class="rank-cell ${rankClass}">${rank}</td>
        <td>
          <span class="player-num">#${p.num}</span><span class="player-name">${p.name}</span>
          <span class="games-mini">${p.games}半荘</span>
        </td>
        <td class="num"><span class="points ${ptClass}">${ptStr}</span></td>
        <td class="num">${p.avgRank.toFixed(2)}</td>
        <td class="center">
          <span class="rank-dist">
            <span>${p.ranks[0]}</span>
            <span>${p.ranks[1]}</span>
            <span>${p.ranks[2]}</span>
            <span>${p.ranks[3]}</span>
          </span>
        </td>
      </tr>
    `;
  }).join('');
  document.getElementById('rankingWrap').innerHTML = `
    <div class="ranking">
      <table>
        <thead>
          <tr>
            <th class="center">順位</th>
            <th>プレイヤー</th>
            <th class="num">累計pt</th>
            <th class="num">平均順位</th>
            <th class="center">着順分布</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// 期間内の最新大会日の対局を時系列順(古い→新しい)で表示
function renderTodayList(latestDayGames) {
  if (!latestDayGames || latestDayGames.length === 0) {
    document.getElementById('todayList').innerHTML = `<div class="empty-state" style="padding: 40px 16px;"><div class="emoji">📭</div>この期間に対局はありません</div>`;
    return;
  }
  // 大会日を先頭に表示
  const dateOf = new Date(latestDayGames[0].gameDate || latestDayGames[0].timestamp);
  const dateLabel = `${dateOf.getFullYear()}年${dateOf.getMonth() + 1}月${dateOf.getDate()}日`;

  // 古い順に並べて表示
  const sorted = [...latestDayGames].sort((a, b) => a.timestamp - b.timestamp);
  const items = sorted.map((g, idx) => {
    const time = new Date(g.timestamp).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    // 回戦・卓情報を優先表示、なければ「N半荘目」
    let title;
    if (g.kaisen && g.taku) {
      title = `${g.kaisen}回戦 ${g.taku}卓`;
    } else if (g.kaisen) {
      title = `${g.kaisen}回戦`;
    } else {
      title = `${idx + 1}半荘目`;
    }
    return `
      <div class="today-item">
        <div class="today-item-head">
          <span class="today-item-num">${title}</span>
          <span>${time}</span>
        </div>
        <div class="today-mini-list">
          ${g.results.map(r => {
            const ptClass = r.pt >= 0 ? 'pos' : 'neg';
            const ptStr = (r.pt > 0 ? '+' : '') + r.pt.toFixed(1);
            return `
              <div class="today-mini-row r${r.rank}">
                <div class="today-mini-rank">${r.rank}</div>
                <div class="today-mini-name">${r.name}</div>
                <div class="today-mini-score">${r.score.toLocaleString()}</div>
                <div class="today-mini-pt ${ptClass}">${ptStr}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('todayList').innerHTML = `
    <div style="font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); letter-spacing: 0.15em; margin-bottom: 12px; text-align: right;">${dateLabel}</div>
    <div class="today-list">${items}</div>
  `;
}

function renderHomeRecords(games) {
  const recent = games.slice(0, 30); // 最新30件
  if (recent.length === 0) {
    document.getElementById('recordsList').innerHTML = `<div class="empty-state"><div class="emoji">🎴</div>対局履歴がありません</div>`;
    return;
  }
  document.getElementById('recordsList').innerHTML = `<div class="records">` +
    recent.map(g => renderGameRow(g)).join('') +
  `</div>`;
}

function renderGameRow(g) {
  const d = new Date(g.gameDate || g.timestamp);
  const meta = [];
  if (g.setsu) meta.push(`第${g.setsu}節`);
  if (g.kaisen) meta.push(`${g.kaisen}回戦`);
  if (g.taku) meta.push(`${g.taku}卓`);
  const metaLabel = meta.length > 0 ? `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-mute);margin-top:4px;">${meta.join(' · ')}</div>` : '';
  return `
    <div class="record-row">
      <div class="record-time">
        <span class="date">${formatDateShort(d)}</span>
        ${formatYear(d)}
        ${metaLabel}
      </div>
      <div class="record-results">
        ${g.results.map(r => {
          const ptClass = r.pt >= 0 ? 'pos' : 'neg';
          const ptStr = (r.pt > 0 ? '+' : '') + r.pt.toFixed(1);
          const seatTag = r.seat ? `<span class="seat-tag">${r.seat}</span>` : '';
          return `
            <div class="result-slot r${r.rank}">
              <div class="result-rank">${r.rank}</div>
              <div class="result-info">
                <div class="result-name">${seatTag}<span class="pn">#${r.num}</span>${r.name}</div>
                <div class="result-score">${r.score.toLocaleString()}</div>
              </div>
              <div class="result-pt ${ptClass}">${ptStr}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function formatYear(d) {
  return d.getFullYear();
}

function formatDateShort(d) {
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function formatDateFull(d) {
  return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
}

// ============================================================
// 描画呼び出し
// ============================================================
function renderCurrentView() {
  renderHome();
}

// ============================================================
// データ読込
// ============================================================
function buildCsvUrl(url) {
  const m = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
  if (!m) return url;
  const id = m[1];
  const gidMatch = url.match(/[?&#]gid=(\d+)/);
  const gid = gidMatch ? gidMatch[1] : '0';
  return `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
}

async function loadData(silent = false) {
  const url = document.getElementById('sheetUrl').value.trim();
  const masterUrl = document.getElementById('masterUrl').value.trim();
  const status = document.getElementById('status');

  if (!url) {
    // サンプル
    initSampleMaster();
    allRows = SAMPLE_ROWS;
    allGames = processRows(allRows);
    status.textContent = '● サンプルデータ表示中';
    status.style.color = 'var(--ink-mute)';
    document.getElementById('dataInfo').textContent = 'SAMPLE DATA';
    renderCurrentView();
    stopAutoRefresh();
    return;
  }

  try {
    if (!silent) status.textContent = '○ 読込中...';

    // 1. 結果CSVを先に読んで節番号の一覧を得る
    const resCsv = await fetch(buildCsvUrl(url) + '&_=' + Date.now());
    if (!resCsv.ok) throw new Error('結果読込失敗');
    const resText = await resCsv.text();
    // 一時的にマスタなしで解析して節番号を拾う
    const preParsed = parsePreCSV(resText);
    const setsuSet = new Set(preParsed.map(r => r.setsu).filter(s => s));

    // 2. 各節の選手マスタを読み込む
    playerMaster = {};
    if (masterUrl && setsuSet.size > 0) {
      const promises = Array.from(setsuSet).map(async (setsu) => {
        const sheetName = `選手マスタ_第${setsu}節`;
        try {
          const csvUrl = buildMasterSheetUrl(masterUrl, sheetName);
          const r = await fetch(csvUrl + '&_=' + Date.now());
          if (r.ok) {
            const txt = await r.text();
            playerMaster[setsu] = parseMasterCSV(txt);
          } else {
            playerMaster[setsu] = {};
          }
        } catch (e) {
          playerMaster[setsu] = {};
        }
      });
      await Promise.all(promises);
    }

    // 3. マスタが揃った状態で本パース
    allRows = parseCSV(resText);
    allGames = processRows(allRows);

    const now = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    // 全マスタから重複除去した人数を表示
    const allNames = new Set();
    Object.values(playerMaster).forEach(m => Object.values(m).forEach(name => allNames.add(name)));
    const masterInfo = allNames.size > 0 ? ` / 選手 ${allNames.size}名` : '';
    const setsuInfo = setsuSet.size > 0 ? ` / ${setsuSet.size}節` : '';
    status.textContent = `● 更新 ${now} (${allRows.length}対局${setsuInfo}${masterInfo})`;
    status.style.color = 'var(--bamboo)';
    document.getElementById('dataInfo').textContent = 'GOOGLE SHEETS · ' + allRows.length + ' GAMES';
    renderCurrentView();
    startAutoRefresh();
  } catch (e) {
    status.textContent = '✕ ' + e.message;
    status.style.color = 'var(--accent)';
  }
  document.getElementById('lastUpdate').textContent = new Date().toLocaleDateString('ja-JP');
}

// 結果CSVを軽く解析して節番号を拾うためだけの関数
function parsePreCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(s => s.trim());
    if (cols.length < 13) continue;
    const setsu = parseInt(cols[1]);
    if (!isNaN(setsu)) rows.push({ setsu });
  }
  return rows;
}

// 選手マスタスプシから、シート名を指定して読み込むためのURLを組み立てる
function buildMasterSheetUrl(masterUrl, sheetName) {
  const m = masterUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
  if (!m) return masterUrl;
  const id = m[1];
  // gviz APIでシート名指定
  return `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
}

function parseMasterCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const map = {};
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(s => s.trim());
    if (cols.length < 2) continue;
    const num = parseInt(cols[0]);
    const name = cols[1];
    if (!isNaN(num) && name) map[num] = name;
  }
  return map;
}

// 結果CSV: 対局日, 節, 回戦, 卓,
//         東家選手番号, 東家点数, 南家選手番号, 南家点数,
//         西家選手番号, 西家点数, 北家選手番号, 北家点数,
//         送信日時 (13列)
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(s => s.trim());
    if (cols.length < 13) continue;
    const setsu = parseInt(cols[1]) || null;
    const players = [];
    let valid = true;
    const seatNames = ['東', '南', '西', '北'];
    for (let p = 0; p < 4; p++) {
      const base = 4 + p * 2;
      const num = parseInt(cols[base]);
      const score = parseInt(cols[base + 1]);
      if (isNaN(num) || isNaN(score)) { valid = false; break; }
      // 節ごとの選手マスタから名前を取得
      const name = getPlayerName(setsu, num);
      players.push({ num, name, score, seat: seatNames[p] });
    }
    if (!valid) continue;

    const gameDateRaw = cols[0];
    const submittedRaw = cols[12];

    let ts = Date.parse(submittedRaw);
    if (isNaN(ts)) ts = Date.parse(gameDateRaw);
    if (isNaN(ts)) ts = i;

    let gameDate = Date.parse(gameDateRaw);
    if (isNaN(gameDate)) gameDate = ts;

    rows.push({
      timestamp: ts,
      gameDate: gameDate,
      setsu: parseInt(cols[1]) || null,
      kaisen: parseInt(cols[2]) || null,
      taku: parseInt(cols[3]) || null,
      players
    });
  }
  return rows;
}

function startAutoRefresh() {
  if (AUTO_REFRESH_MS <= 0) return;
  stopAutoRefresh();
  autoRefreshTimer = setInterval(() => loadData(true), AUTO_REFRESH_MS);
}
function stopAutoRefresh() {
  if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
}

function toggleSource() {
  document.getElementById('sourceDetail').classList.toggle('visible');
  document.getElementById('sourceDetail2').classList.toggle('visible');
}

// ============================================================
// 初期化
// ============================================================
if (DEFAULT_RESULTS_URL) {
  document.getElementById('sheetUrl').value = DEFAULT_RESULTS_URL;
  document.getElementById('masterUrl').value = DEFAULT_MASTER_URL;
  loadData();
} else {
  allRows = SAMPLE_ROWS;
  allGames = processRows(allRows);
  renderHome();
}
